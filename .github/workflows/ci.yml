name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0'
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # BACKEND CI (.NET)
  # ==========================================
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test tests/Crm.Application.Tests \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "console;verbosity=normal"

      - name: Run integration tests (SQLite)
        run: |
          dotnet test tests/Crm.Api.Integration.Tests \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "console;verbosity=normal"

      - name: Check code format
        run: |
          dotnet format verify --verify-no-changes
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/*.xml

  # ==========================================
  # FRONTEND CI (React + Vite)
  # ==========================================
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover web directory
        id: discover
        run: |
          WEB_DIR=$(find . -maxdepth 2 -name "package.json" -exec dirname {} \; | head -1)
          echo "WEB_DIR=$WEB_DIR" >> $GITHUB_OUTPUT
          echo "Found web directory: $WEB_DIR"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ steps.discover.outputs.WEB_DIR }}

      - name: Run ESLint
        run: npm run lint
        working-directory: ${{ steps.discover.outputs.WEB_DIR }}

      - name: Run TypeScript check
        run: npx tsc --noEmit
        working-directory: ${{ steps.discover.outputs.WEB_DIR }}

      - name: Run tests
        run: npm run test:run -- --coverage
        working-directory: ${{ steps.discover.outputs.WEB_DIR }}

      - name: Build
        run: npm run build
        working-directory: ${{ steps.discover.outputs.WEB_DIR }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: ${{ steps.discover.outputs.WEB_DIR }}/coverage

  # ==========================================
  # SUMMARY
  # ==========================================
  success:
    name: CI Passed
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          
          if [[ "${{ needs.backend.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "CI failed!"
            exit 1
          fi
          echo "All checks passed!"