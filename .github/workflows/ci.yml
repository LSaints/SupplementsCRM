name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_VERSION: '10.0'
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # BACKEND CI (.NET)
  # ==========================================
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test tests/Crm.Application.Tests \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "console;verbosity=normal"

      - name: Run integration tests (SQLite)
        run: |
          dotnet test tests/Crm.Api.Integration.Tests \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "console;verbosity=normal"

      - name: Check code format
        run: |
          dotnet format verify --verify-no-changes
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: backend-test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/*.xml

  # ==========================================
  # FRONTEND CI (React + Vite)
  # ==========================================
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        working-directory: src/Crm.Web
        run: npm ci

      - name: Run ESLint
        working-directory: src/Crm.Web
        run: npm run lint

      - name: Run TypeScript check
        working-directory: src/Crm.Web
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: src/Crm.Web
        run: npm run test:run -- --coverage

      - name: Build
        working-directory: src/Crm.Web
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: src/Crm.Web/coverage

  # ==========================================
  # LOCK FILE INTEGRITY
  # ==========================================
  lock-files:
    name: Lock Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore NuGet
        run: dotnet restore

      - name: Check NuGet lock file
        run: |
          if grep -q "<LockFile>" **/*.csproj 2>/dev/null; then
            echo "Checking NuGet lock files..."
            # Verificar se lock file está em sync
            dotnet restore --locked-mode || exit 1
          fi
        shell: bash

      - name: Install npm dependencies
        working-directory: src/Crm.Web
        run: npm ci

      - name: Verify package-lock.json
        working-directory: src/Crm.Web
        run: |
          if [ -f package-lock.json ]; then
            npm audit --package-lock-only || true
          fi

      - name: Check for uncommitted changes
        run: |
          git status --porcelain

  # ==========================================
  # SUMMARY
  # ==========================================
  success:
    name: CI Passed
    needs: [backend, frontend, lock-files]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check results
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Lock Files: ${{ needs.lock-files.result }}"
          
          if [[ "${{ needs.backend.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend.result }}" == "failure" ]] || \
             [[ "${{ needs.lock-files.result }}" == "failure" ]]; then
            echo "CI failed!"
            exit 1
          fi
          echo "All checks passed!"